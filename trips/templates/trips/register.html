<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account | Travel World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1600&q=80'); background-size: cover; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; }
        .register-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 480px; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .form-control { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 10px; }
        .form-control::placeholder { color: #ddd; }
        .btn-reg { background: #ff5a5f; color: white; font-weight: bold; width: 100%; border-radius: 10px; padding: 12px; border: none; transition: 0.3s; }
        .btn-reg:hover { background: #e0484d; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="register-glass text-center">
        <h2 class="fw-bold mb-3"><i class="fas fa-user-plus"></i> REGISTER</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 small fw-bold">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">User ID</label>
                    <input type="text" name="userid" class="form-control" placeholder="ID Number" required>
                </div>
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Login Name" required>
                </div>
            </div>
            <div class="mb-3 text-start">
                <label class="small fw-bold">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min. 8 chars" required>
                </div>
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
            </div>
            <div class="mb-3 text-start form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small" for="terms">I agree to the Terms & Conditions</label>
            </div>
            <button type="submit" class="btn-reg">CREATE NEW ACCOUNT</button>
            <p class="mt-3 small">Already registered? <a href="{% url 'login' %}" class="text-white fw-bold">Login here</a></p>
        </form>
    </div>
</body>
</html>
