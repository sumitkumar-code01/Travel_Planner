<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Travel World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Viewport Rules: Positions the content block exactly centered using background overlay masks */
        body { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1600&q=80'); background-size: cover; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; }
        
        /* Glassmorphism Surface Panel: Implements a blurred white overlay layer bound via custom border variables */
        .register-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 480px; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        /* Form Operational Controls: Custom transparency layouts governing textual inputs canvas fields */
        .form-control { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 10px; }
        .form-control::placeholder { color: #ddd; }
        
        /* Submission CTA Button Action Elements: Handles flat brand coloration and hover micro-transformations tracking */
        .btn-reg { background: #ff5a5f; color: white; font-weight: bold; width: 100%; border-radius: 10px; padding: 12px; border: none; transition: 0.3s; }
        .btn-reg:hover { background: #e0484d; transform: scale(1.02); }
    </style>
</head>
<body>
    <!-- Main Form Box Wrapper Container Shell -->
    <div class="register-glass text-center">
        <!-- Structural Section Heading Header Icon Badge -->
        <h2 class="fw-bold mb-3"><i class="fas fa-user-plus"></i> REGISTER</h2>
        
        <!-- SYSTEM NOTIFICATION FRAMEWORK: Loops dynamically to read layout exception responses sent from backend routers -->
        {% if messages %}
            {% for message in messages %}
                <!-- Error reporting presentation block parsing system message strings indices -->
                <div class="alert alert-danger py-2 small fw-bold">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <!-- Account Credentials Registration Block: Forwards user account data dictionaries onto server processing view channels -->
        <form method="POST">
            <!-- Django native security framework parameter securing form submissions against cross-site request forgery attacks -->
            {% csrf_token %}
            
            <!-- Grid Row Layout: Splits the horizontal viewport to parse identification records and names variables simultaneously -->
            <div class="row">
                <!-- User ID Index String Field Input Control -->
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">User ID</label>
                    <input type="text" name="userid" class="form-control" placeholder="ID Number" required>
                </div>
                <!-- User Account Profile Login Name Input Control -->
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Login Name" required>
                </div>
            </div>
            
            <!-- Communication Layer Electronic Mail Address Form Input Control -->
            <div class="mb-3 text-start">
                <label class="small fw-bold">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
            </div>
            
            <!-- Grid Row Layout: Aligns matching password validation variables next to each other within uniform column segments -->
            <div class="row">
                <!-- Account Access Entry Password Field Control -->
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min. 8 chars" required>
                </div>
                <!-- Integrity Verification Duplicate Password Check Input Control -->
                <div class="col-md-6 mb-3 text-start">
                    <label class="small fw-bold">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
            </div>
            
            <!-- Regulatory Compliance Operational Policy Acknowledgment Box Control Node -->
            <div class="mb-3 text-start form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small" for="terms">I agree to the Terms & Conditions</label>
            </div>
            
            <!-- Action execution controller dispatching registration dataset collections properties -->
            <button type="submit" class="btn-reg">CREATE NEW ACCOUNT</button>
            
            <!-- Guest Authorization Back-routing Interfacing Node Link -->
            <p class="mt-3 small">Already registered? <a href="{% url 'login' %}" class="text-white fw-bold">Login here</a></p>
        </form>
    </div>
</body>
</html>
