<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Travel World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1488085061387-422e29b40080?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; }
        .login-glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3); width: 100%; max-width: 420px; color: white; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .form-control { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); color: white; border-radius: 12px; }
        .btn-signin { background: #fff; color: #4e54c8; font-weight: 700; border-radius: 12px; padding: 12px; width: 100%; border: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-glass text-center">
        <h2 class="fw-bold mb-2 text-white">TRAVEL WORLD</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-signin text-uppercase">Sign In</button>
        </form>
    </div>
</body>
</html>
