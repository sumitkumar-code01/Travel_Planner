<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevents browser from caching token state when using back button -->
    <!-- Security configurations forcing standard browsers to request fresh verification payloads upon backwards navigation steps -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Login | Travel World</title>
    <!-- Google Fonts for crisp typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base Viewport Layout: Setup centered full-bleed container using absolute overlay opacity rules */
        body { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1488085061387-422e29b40080?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80'); 
            background-size: cover; 
            background-position: center;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Poppins', sans-serif; 
        }
        /* Glassmorphism Panel: Implements translucent white backgrounds using advanced backdrop filter properties */
        .login-glass { 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            padding: 45px 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.25); 
            width: 100%; 
            max-width: 420px; 
            color: white; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        /* Custom Input Styling: Configures semi-transparent typing canvas boundaries with high opacity markers */
        .form-control { 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: white; 
            border-radius: 12px; 
            padding: 12px 16px;
            transition: all 0.2s ease-in-out;
        }
        /* Selection Focus Enhancements: Maximizes glowing visibility rings upon targeted item activation loops */
        .form-control:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.9rem;
        }
        /* Custom styling to keep input text white on auto-fill selection */
        /* Overrides user-agent system defaults to lock uniform typographic coloration during auto-complete queries */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover, 
        .form-control:-webkit-autofill:focus {
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        /* Submission Controller CTA Element: Design values managing hovering movements and micro-lifts */
        .btn-signin { 
            background: #ffffff; 
            color: #4e54c8; 
            font-weight: 700; 
            border-radius: 12px; 
            padding: 14px; 
            width: 100%; 
            border: none; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-signin:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }
        .btn-signin:active {
            transform: translateY(1px);
        }
        .alert {
            border-radius: 12px;
            border: none;
        }
        /* Registration Links Setup: Hover animations for entry registration portals */
        .register-link {
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .register-link:hover {
            text-decoration: underline;
            color: #f3f4f6 !important;
        }
    </style>
</head>
<body>
    <!-- Main Display Shell Wrapper Container -->
    <div class="login-glass text-center">
        <h2 class="fw-bold mb-2 text-white" style="letter-spacing: 1.5px;">TRAVEL WORLD</h2>
        <p class="text-white-50 small mb-4">Welcome back! Please login to your account.</p>
        
        <!-- RESPONSE MESSAGES FRAMEWORK: Loops dynamically to read application database context responses -->
        {% if messages %}
            {% for message in messages %}
                <!-- Conditional routing assigning appropriate color templates based on current status tags -->
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %} py-2 small fw-bold mb-3 shadow-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Added autocomplete="off" to clear system conflicts on forced back steps -->
        <!-- Authorization Capture Form Block: Safely forwards authentication data inputs over to backend routers -->
        <form method="POST" autocomplete="off">
            <!-- Django built-in middleware configuration protecting pipelines from malicious verification forgery -->
            {% csrf_token %}
            <!-- Account Username Input Identifier Field -->
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-white-50">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>
            <!-- Account Password Verification Secret Field -->
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-white-50">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
            <!-- Submission action trigger button dispatching credentials record maps -->
            <button type="submit" class="btn-signin text-uppercase">Sign In</button>
        </form>
        
        <!-- Registration Navigation Redirection Pipeline -->
        <p class="mt-4 small text-white-50">Don't have an account? <a href="{% url 'register' %}" class="text-white fw-bold register-link">Register Now</a></p>
    </div>
</body>
</html>
