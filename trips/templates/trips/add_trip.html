<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Your Plan | Travel World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Poppins', sans-serif; }
        .card-plan { border-radius: 25px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.2); background: white; padding: 40px; }
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-create { background: #4e54c8; color: white; border-radius: 10px; padding: 12px; width: 100%; font-weight: bold; border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-plan">
                <h3 class="text-center fw-bold text-primary mb-4">Hello, {{ user.username }}! 👋</h3>
                <p class="text-center text-muted mb-4">Enter the Name of the Place where you want to visit.</p>
                
            <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Destination Name</label>
                        <input type="text" name="destination" class="form-control" placeholder="e.g. Goa, Paris, Manali" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Start Date</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">End Date</label>
                            <input type="date" name="end_date" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Number of Days</label>
                        <input type="number" name="days" class="form-control" placeholder="How many days?" required min="1">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Total Budget (₹)</label>
                        <input type="number" name="budget" class="form-control" placeholder="Enter your budget" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        ✨ Create My Dream Plan
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
