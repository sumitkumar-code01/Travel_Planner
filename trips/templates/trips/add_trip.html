<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Plan | Travel World</title>
    <!-- Google Fonts for Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Body Configuration: Sets up the full-height background gradient, alignment, and default typography typography */
        body { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #c084fc 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            font-family: 'Poppins', sans-serif; 
            padding: 20px 0;
        }
        /* Card Layout Design: Main white translucent surface block wrapper holding form elements with soft depth elevations */
        .card-plan { 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.25); 
            background: #ffffff; 
            padding: 45px 40px; 
            transition: all 0.3s ease;
        }
        .form-label {
            color: #4b5563;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        /* Input Form Controls: Standard UI spacing variables governing typography, paddings, and background layers */
        .form-control { 
            border-radius: 12px; 
            padding: 14px 16px; 
            margin-bottom: 18px; 
            border: 1px solid #e5e7eb; 
            background-color: #f9fafb;
            color: #1f2937;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }
        /* Interactive Input States: Soft border transition tracking glowing canvas rings during selection focus states */
        .form-control:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            outline: none;
        }
        .form-control::placeholder {
            color: #9ca3af;
        }
        /* Disabled Input Block States: Locks typography and surfaces when fields are protected from modification */
        .form-control:disabled {
            background-color: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }
        /* Action Execution CTA Buttons: High-visibility multi-color gradient trigger buttons controlling interactive scaling loops */
        .btn-create-plan { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
            color: white; 
            border-radius: 12px; 
            padding: 14px; 
            width: 100%; 
            font-weight: 600; 
            font-size: 1.05rem;
            border: none; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-create-plan:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            color: white;
        }
        .btn-create-plan:active {
            transform: translateY(1px);
        }
        /* Built-in Custom Notification Panel: Design specifications for error layout layers */
        .alert-danger {
            border-radius: 12px;
            border: none;
            background-color: #fef2f2;
            color: #dc2626;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.08);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-plan">
                <!-- Branding Typography Header: Renders user greetings using dynamic Django model interpolation maps -->
                <h3 class="text-center fw-bold text-transparent bg-clip-text mb-2" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hello, {{ user.username }} 👋</h3>
                <p class="text-center text-muted mb-4 small">Enter the Name of the Place where you want to visit.</p>
                
                <!-- Custom Application Error Message Alert Box Container (Controlled dynamically via Javascript) -->
                <div id="error-alert" class="alert alert-danger d-none small fw-bold text-center mb-4" role="alert"></div>

                <!-- Input Submission Layout Area: Form configured with 'novalidate' to override native browser alerts in favor of custom UI responses -->
                <form method="POST" id="tripForm" novalidate>
                    {% csrf_token %}
                    <!-- Destination Location Input Element -->
                    <div class="mb-1">
                        <label class="form-label small fw-bold">Destination Name</label>
                        <input type="text" name="destination" class="form-control" placeholder="🗺️ e.g. Goa, Paris, Manali" required>
                    </div>
                    
                    <!-- Date Pickers Row Matrix -->
                    <div class="row">
                        <!-- Start Journey Date Input Parameter Field -->
                        <div class="col-md-6 mb-1">
                            <label class="form-label small fw-bold">Start Date</label>
                            <input type="date" id="start_date" name="start_date" class="form-control" required>
                        </div>
                        <!-- Termination Journey Date Input Parameter Field (Initially Locked until start date is resolved) -->
                        <div class="col-md-6 mb-1">
                            <label class="form-label small fw-bold">End Date</label>
                            <input type="date" id="end_date" name="end_date" class="form-control" required disabled>
                        </div>
                    </div>

                    <!-- Hidden parameter input state tracking the absolute mathematical duration interval passed back to views -->
                    <input type="hidden" id="days" name="days" value="1">

                    <!-- Budget Currency Capacity Numerical Entry Node -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Total Budget (₹)</label>
                        <input type="number" id="budget" name="budget" class="form-control" placeholder="💳 Enter your budget" required>
                    </div>

                    <!-- Submission trigger controller handling final application pipelines verification checks -->
                    <button type="submit" class="btn-create-plan">
                        ✨ Create My Dream Plan
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- CLIENT JAVASCRIPT LOGIC ENGINE: Driving continuous structural validation loops and runtime computation engines -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Gathering structural form input elements from the document DOM tree
        const startDateInput = document.getElementById("start_date");
        const endDateInput = document.getElementById("end_date");
        const daysInput = document.getElementById("days");
        const errorAlert = document.getElementById("error-alert");
        const tripForm = document.getElementById("tripForm");
        const budgetInput = document.getElementById("budget");

        // 1. Minimum Date Initialization: Isolates the current date string index map to lock out historical choices
        const today = new Date().toISOString().split('T')[0];
        startDateInput.setAttribute('min', today);

        // 2. Start Journey Input Value Change Listener Pipeline Handles
        startDateInput.addEventListener("change", function () {
            const startDateVal = startDateInput.value;
            
            if (startDateVal) {
                // Unlock End Date selection choice block
                endDateInput.removeAttribute("disabled");
                
                // Updates boundary rules ensuring the termination coordinate cannot trail the start vector
                endDateInput.setAttribute("min", startDateVal);
                
                // Compute Maximum Package Limits: Caps selectable boundaries exactly at 30 days total timeline allocation
                let startDateObj = new Date(startDateVal);
                let maxDateObj = new Date(startDateObj);
                maxDateObj.setDate(startDateObj.getDate() + 29); 
                
                const maxDateVal = maxDateObj.toISOString().split('T')[0];
                endDateInput.setAttribute("max", maxDateVal);
                
                // Verification Reset: Purges out conflicting timeline configurations if inputs breach standard limitations
                if (endDateInput.value && (endDateInput.value < startDateVal || endDateInput.value > maxDateVal)) {
                    endDateInput.value = "";
                    daysInput.value = "1";
                } else {
                    calculateDays();
                }
            } else {
                // Safeguard Reset: Fallback strategy re-locking parameters when choices are deleted
                endDateInput.setAttribute("disabled", "true");
                endDateInput.value = "";
            }
        });

        // 3. End Journey Input Value Change Event Listener Hook
        endDateInput.addEventListener("change", calculateDays);

        // Mathematical Computing Core: Resolves total calendar tracking intervals based on input matrices
        function calculateDays() {
            errorAlert.classList.add("d-none"); // Flushes and hides old notification block spaces from view
            
            if (startDateInput.value && endDateInput.value) {
                const start = new Date(startDateInput.value);
                const end = new Date(endDateInput.value);
                
                // Calculates absolute timestamp differences transformed exactly into whole day digits
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // Explicitly accounts for inclusive dates
                
                // Safety Exception Layer: Protects backend data from accepting packages overflowing standard limits
                if (diffDays > 30) {
                    showError("⚠️ You can only create a plan for up to 30 days!");
                    endDateInput.value = "";
                    daysInput.value = "1";
                } else {
                    daysInput.value = diffDays;
                }
            }
        }

        // 4. Final Application Form Submission Interceptor & Validation Pipelines
        tripForm.addEventListener("submit", function (e) {
            const start = new Date(startDateInput.value);
            const end = new Date(endDateInput.value);
            const currentToday = new Date(today);
            const budgetVal = parseFloat(budgetInput.value);

            // TRAVEL PLANNER CUSTOMIZED PREMIUM BUDGET VALIDATION LAYER
            // Blocks submission attempts dropping below the absolute target parameter floor threshold of 10,000 INR
            if (!budgetInput.value || budgetVal < 10000 || isNaN(budgetVal)) {
                e.preventDefault(); // Halts network transit propagation routes immediately
                showError("✨ To craft an amazing getaway with top-tier stays and local experiences, a minimum budget of ₹10,000 is required. Please upscale your budget to unlock your dream plan!");
                return false;
            }

            // Timeline Security Firewall Check: Evaluates and terminates submission operations using old timelines
            if (start < currentToday) {
                e.preventDefault();
                showError("❌ Backdate selection is invalid! Please select the current date or a future date.");
                return false;
            }

            // Interval Sizing Validation System
            const diffTime = end - start;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            if (diffDays > 30) {
                e.preventDefault();
                showError("❌ Trip duration exceeds the 30-day limit! Please adjust your dates.");
                return false;
            }
            
            if (diffDays <= 0) {
                e.preventDefault();
                showError("❌ End Date must be equal to or after the Start Date!");
                return false;
            }
        });

        // Visual Presentation Framework: Injects context errors and smoothly moves user focus anchors to the alert layer
        function showError(message) {
            errorAlert.innerText = message;
            errorAlert.classList.remove("d-none");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>
</body>
</html>
