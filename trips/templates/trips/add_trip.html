<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Plan | Travel World</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🌟 PREMIUM SYSTEM NAVIGATION HEADER BASE DESIGN STYLES */
        .custom-navbar-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding: 14px 0;
            width: 100%;
        }
        .navbar-brand-custom {
            font-weight: 800;
            font-size: 1.4rem;
            color: #4f46e5;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .nav-link-custom {
            color: #4b5563;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 18px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
        }
        .nav-link-custom:hover {
            color: #7c3aed;
            background: rgba(124, 58, 237, 0.05);
        }
        .nav-link-custom.active-route-token {
            color: #4f46e5;
            background: rgba(79, 70, 229, 0.08);
        }

        body { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #c084fc 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; /* Stack header vertically on top */
            align-items: center; 
            font-family: 'Poppins', sans-serif; 
            padding: 0 0 20px 0;
        }
        .main-form-workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }
        .card-plan { 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.25); 
            background: #ffffff; 
            padding: 45px 40px; 
            transition: all 0.3s ease;
        }
        .form-label {
            color: #4b5563;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        .form-control { 
            border-radius: 12px; 
            padding: 14px 16px; 
            margin-bottom: 18px; 
            border: 1px solid #e5e7eb; 
            background-color: #f9fafb;
            color: #1f2937;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            outline: none;
        }
        .form-control::placeholder {
            color: #9ca3af;
        }
        .form-control:disabled {
            background-color: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }
        .btn-create-plan { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
            color: white; 
            border-radius: 12px; 
            padding: 14px; 
            width: 100%; 
            font-weight: 600; 
            font-size: 1.05rem;
            border: none; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-create-plan:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            color: white;
        }
        .btn-create-plan:active {
            transform: translateY(1px);
        }
        .alert-danger {
            border-radius: 12px;
            border: none;
            background-color: #fef2f2;
            color: #dc2626;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.08);
        }
    </style>
</head>
<body>

<header class="custom-navbar-wrapper">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="{% url 'landing' %}" class="navbar-brand-custom">
            <i class="fa-solid fa-plane-departure me-2"></i> TRAVEL WORLD
        </a>
        <nav class="d-flex gap-2">
            <a href="{% url 'landing' %}" class="nav-link-custom"><i class="fa-solid fa-house me-2"></i>Home</a>
            <a href="/about/" class="nav-link-custom"><i class="fa-solid fa-circle-info me-2"></i>About</a>
            <a href="{% url 'contact_us' %}" class="nav-link-custom"><i class="fa-solid fa-envelope me-2"></i>Contact Us</a>
        </nav>
    </div>
</header>

<div class="main-form-workspace">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card-plan">
                    <h3 class="text-center fw-bold text-transparent bg-clip-text mb-2" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hello, {{ user.username }} 👋</h3>
                    <p class="text-center text-muted mb-4 small">Enter the Name of the Place where you want to visit.</p>
                    
                    <div id="error-alert" class="alert alert-danger d-none small fw-bold text-center mb-4" role="alert"></div>

                    <form method="POST" id="tripForm" novalidate>
                        {% csrf_token %}
                        <div class="mb-1">
                            <label class="form-label small fw-bold">Destination Name</label>
                            <input type="text" name="destination" class="form-control" placeholder="🗺️ e.g. Goa, Paris, Manali" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-1">
                                <label class="form-label small fw-bold">Start Date</label>
                                <input type="date" id="start_date" name="start_date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-1">
                                <label class="form-label small fw-bold">End Date</label>
                                <input type="date" id="end_date" name="end_date" class="form-control" required disabled>
                            </div>
                        </div>

                        <input type="hidden" id="days" name="days" value="1">

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Total Budget (₹)</label>
                            <input type="number" id="budget" name="budget" class="form-control" placeholder="💳 Enter your budget" required>
                        </div>

                        <button type="submit" class="btn-create-plan">
                            ✨ Create My Dream Plan
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const startDateInput = document.getElementById("start_date");
        const endDateInput = document.getElementById("end_date");
        const daysInput = document.getElementById("days");
        const errorAlert = document.getElementById("error-alert");
        const tripForm = document.getElementById("tripForm");
        const budgetInput = document.getElementById("budget");

        // 1. Set Minimum Date to Today (Prevents Back Date Selection)
        const today = new Date().toISOString().split('T')[0];
        startDateInput.setAttribute('min', today);

        // 2. When Start Date Changes
        startDateInput.addEventListener("change", function () {
            const startDateVal = startDateInput.value;
            
            if (startDateVal) {
                // Unlock End Date
                endDateInput.removeAttribute("disabled");
                
                // End Date cannot be before Start Date
                endDateInput.setAttribute("min", startDateVal);
                
                // Calculate Max Date (Start Date + 29 Days = 30 Days Total Plan Limit)
                let startDateObj = new Date(startDateVal);
                let maxDateObj = new Date(startDateObj);
                maxDateObj.setDate(startDateObj.getDate() + 29); 
                
                const maxDateVal = maxDateObj.toISOString().split('T')[0];
                endDateInput.setAttribute("max", maxDateVal);
                
                // Reset End Date if it violates new conditions
                if (endDateInput.value && (endDateInput.value < startDateVal || endDateInput.value > maxDateVal)) {
                    endDateInput.value = "";
                    daysInput.value = "1";
                } else {
                    calculateDays();
                }
            } else {
                endDateInput.setAttribute("disabled", "true");
                endDateInput.value = "";
            }
        });

        // 3. When End Date Changes
        endDateInput.addEventListener("change", calculateDays);

        // Function to calculate and auto-fill days gap
        function calculateDays() {
            errorAlert.classList.add("d-none"); // Hide errors if any
            
            if (startDateInput.value && endDateInput.value) {
                const start = new Date(startDateInput.value);
                const end = new Date(endDateInput.value);
                
                // Time difference calculation
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 includes both start and end days
                
                if (diffDays > 30) {
                    showError("⚠️ You can only create a plan for up to 30 days!");
                    endDateInput.value = "";
                    daysInput.value = "1";
                } else {
                    daysInput.value = diffDays;
                }
            }
        }

        // 4. Final Form Submission Validation
        tripForm.addEventListener("submit", function (e) {
            const start = new Date(startDateInput.value);
            const end = new Date(endDateInput.value);
            const currentToday = new Date(today);
            const budgetVal = parseFloat(budgetInput.value);

            // Travel Planner Customized Premium Budget Validation
            if (!budgetInput.value || budgetVal < 10000 || isNaN(budgetVal)) {
                e.preventDefault();
                showError("✨ To craft an amazing getaway with top-tier stays and local experiences, a minimum budget of ₹10,000 is required. Please upscale your budget to unlock your dream plan!");
                return false;
            }

            if (start < currentToday) {
                e.preventDefault();
                showError("❌ Backdate selection is invalid! Please select the current date or a future date.");
                return false;
            }

            const diffTime = end - start;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            if (diffDays > 30) {
                e.preventDefault();
                showError("❌ Trip duration exceeds the 30-day limit! Please adjust your dates.");
                return false;
            }
            
            if (diffDays <= 0) {
                e.preventDefault();
                showError("❌ End Date must be equal to or after the Start Date!");
                return false;
            }
        });

        function showError(message) {
            errorAlert.innerText = message;
            errorAlert.classList.remove("d-none");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>
</body>
</html>
