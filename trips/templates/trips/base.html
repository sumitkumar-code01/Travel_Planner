{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4e54c8; --secondary: #8f94fb; --dark: #2d3436; --accent: #ff5a5f; }
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .navbar-custom { background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .travel-world-logo { font-weight: 800; font-size: 1.8rem; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand travel-world-logo" href="{% url 'landing' %}">✈️ TRAVEL WORLD</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark mx-2" href="{% url 'landing' %}">HOME</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark mx-2" href="{% url 'contact_us' %}">CONTACT</a></li>
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="btn btn-sm btn-outline-danger ms-2" href="{% url 'logout' %}">Logout ({{ user.username }})</a></li>
                    {% else %}
                        <li class="nav-item"><a href="{% url 'login' %}" class="btn btn-primary btn-sm ms-2 px-4 rounded-pill">Login</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="bg-dark text-white py-4 text-center mt-5">
        <p>© 2026 Travel World | Built with Django</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
