<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Travel World Developers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4e54c8; --secondary: #8f94fb; --accent: #ff5a5f; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; }
        
        .contact-header { 
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            padding: 80px 0; color: white; text-align: center; border-radius: 0 0 50px 50px;
        }

        .dev-card {
            border: none; border-radius: 20px; overflow: hidden;
            background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.4s; height: 100%;
        }
        .dev-card:hover { transform: translateY(-10px); }

        .dev-img { 
            width: 120px; height: 120px; border-radius: 50%; 
            object-fit: cover; border: 4px solid var(--secondary);
            margin: 20px auto; display: block;
        }

        .contact-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            margin: 5px; color: white; text-decoration: none; transition: 0.3s;
        }
        .bg-whatsapp { background: #25D366; }
        .bg-phone { background: #3498db; }
        .bg-email { background: var(--accent); }
        
        .contact-icon:hover { opacity: 0.8; transform: scale(1.1); color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'landing' %}">✈️ TRAVEL WORLD</a>
            <div class="ms-auto">
                <a class="btn btn-outline-primary rounded-pill px-4" href="{% url 'landing' %}">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="contact-header">
        <h1 class="fw-bold">Meet Our Creative Team</h1>
        <p class="lead">We are here to help you plan your next big adventure!</p>
    </div>

    <div class="container mt-n5 mb-5" style="margin-top: -50px;">
        <div class="row g-4 justify-content-center">
            {% for dev in developers %}
            <div class="col-md-3">
                <div class="card dev-card text-center p-3">
                    <img src="{{ dev.img }}" class="dev-img" alt="{{ dev.name }}">
                    <h5 class="fw-bold mb-1">{{ dev.name }}</h5>
                    <p class="text-primary small fw-bold">{{ dev.role }}</p>
                    <hr>
                    <div class="d-flex justify-content-center">
                        <a href="https://wa.me/911234567890" class="contact-icon bg-whatsapp" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                        <a href="tel:+911234567890" class="contact-icon bg-phone" title="Call Us"><i class="fas fa-phone-alt"></i></a>
                        <a href="mailto:contact@travelworld.com" class="contact-icon bg-email" title="Email Us"><i class="fas fa-envelope"></i></a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="text-center py-4 text-muted small">
        © 2026 Travel World Project | Designed with ❤️
    </footer>

</body>
</html>
